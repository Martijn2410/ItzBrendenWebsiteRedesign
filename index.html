<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Home - ItzBrenden.com</title>
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link href='https://cdn.boxicons.com/3.0.7/fonts/basic/boxicons.min.css' rel='stylesheet'>
  <link rel="icon" href="./assets/LauraReborn7_PFP.webp" type="image/x-icon">
</head>

<body>
  <div id="background"></div>
  <video id="background-video" autoplay muted loop playsinline>
    <source src="assets/backgrounds/background.webm" type="video/webm">
  </video>

  <header class="header">
    <a href="index.html" class="logo">
      <img src="assets/LauraReborn7_PFP.webp" alt="Laura Reborn" class="logo-icon">
      <p class="logo-text">ItzBrenden.com</p>
    </a>

    <input type="checkbox" id="check">
    <label for="check" class="icons">
      <i class='bx  bx-menu' id="menu-icon"></i>
      <i class='bx  bx-x' id="close-icon"></i>
    </label>

    <nav class="navbar">
      <a href="" style="--i:1;">Home</a>
      <a href="about.html" style="--i:2;">About me</a>
      <a href="portfolio.html" style="--i:3;">Art Portfolio</a>
      <a href="projects.html" style="--i:4;">OC Projects</a>
    </nav>
  </header>

  <main class="container-row">
    <a href="about.html" class="container-home glass">
      <img src="assets/Female_OC_PFP.png" alt="Female OC" class="container-image">
      <div class="container-caption"><span>About me</span></div>
    </a>

    <a href="portfolio.html" class="container-home glass">
      <img src="assets/OG5Remake16x9.webp" alt="OG5 Remake" class="container-image">
      <div class="container-caption"><span>Art Portfolio</span></div>
    </a>

    <a href="projects.html" class="container-home glass">
      <img src="assets/StoryBanners_AccidentZero.webp" alt="Accident Zero" class="container-image">
      <div class="container-caption"><span>OC Projects</span></div>
    </a>
  </main>

  <script>
    const video = document.getElementById("background-video");

    video.addEventListener("canplay", () => {
      video.classList.add("loaded");
    });
  </script>
  <script type="module">
        const response = await fetch("/assets/rickroll3.gif");
        const blob = await response.blob();

        const reader = new FileReader();
        reader.onloadend = () => {
            const base64data = reader.result; // This is the full data:image/gif;base64,... string

            console.log("%c ", `
                background-image: url('${base64data}'); 
                background-repeat: no-repeat; 
                padding: 320px 500px;
            `);
        };
        reader.readAsDataURL(blob);
    </script>
</body>

</html>
